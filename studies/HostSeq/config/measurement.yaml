# HostSeq Study - Measurement Entity Mapping Configuration
#
# Target Entity: Measurement (PCGL Base + Extension Schema)
# Source: HostSeq REDCap export (repeat_instrument='laboratory_results')
# Pattern: Expansion - Wide-to-long conversion (checkboxes → multiple records)
#
# See YAML_CONFIGURATION_GUIDE.md for detailed documentation on expansion configuration.

entity:
  name: Measurement
  source_files:
    primary: "HostSeqHarmonizedAllVariablesDummy.csv"  # Main source file

  fields:
    base:
      - submitter_participant_id
      - age_at_measurement
      - measurement_code
      - measurement_term
      - measurement_result_numeric
      - measurement_unit
      - measurement_result_categorical
    extension:
      - measurement_source_text
      - measurement_unit_source_text
      - measurement_note
  pattern: expansion
  params:
    participant_id_field: id_hostseq
    selection_type: radio
    skip_values: [0, -1]  # Skip when test was not performed

# =============================================================================
# PREPROCESSING FILTERS
# =============================================================================
filters:
  participant_id_field: "id_hostseq"
  
  participant:
    filter:
      # Must have consent
      - field: consent
        op: equals
        value: 1
      # AND one of these conditions:
      # - Not suspected (covid19_suspected___0 = 0), OR
      # - COVID test positive (covid19_test = 1) even if suspected
      - any:
          - field: covid19_suspected___0
            op: equals
            value: 0
          - field: covid19_test
            op: equals
            value: 1
  
  rows:
    - name: baseline
      filter:
        - field: redcap_repeat_instrument
          op: is_null
    - name: laboratory_results
      filter:
        - field: redcap_repeat_instrument
          op: equals
          value: laboratory_results

  enrich:
    - name: baseline_demographics
      fields: ["dob_year", "dob_month", "age"]
      source:
        - field: redcap_repeat_instrument
          op: is_null


# Optional preprocessing steps before mapping
preprocessing:
  - type: construct_date
    target: birth_date
    params:
      year_field: dob_year
      month_field: dob_month

mappings:
  # ---------------------------------------------------------------------------
  # Measurement Record Expansion
  # Converts lab test checkboxes into N records per participant
  # ---------------------------------------------------------------------------
  - source_field: id_hostseq
    target_field: submitter_participant_id
    source_label: "HostSeq study ID"

  - target_field: age_at_measurement
    target_type: age
    source_label: null
    params:
      birth_date_field: birth_date
      event_date_field: lab_date
      age_fallback_field: null


# Each radio maps to specific LOINC code and UO unit if applicable
configs:
