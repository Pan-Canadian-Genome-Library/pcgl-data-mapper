    term: "Troponin T.cardiac [Mass/volume] in Serum or Plasma"
    source_label: "Troponin"
    enrichments:
      - target_field: measurement_result_numeric
        source_field: lab_troponin_result
        target_type: float
      - target_field: [measurement_unit, measurement_unit_source_text]
        source_field: lab_troponin_unit
        value_mappings:
          'hsTnT': ["UO:0000275", "hsTnT"]
          'hsTnI': ["UO:0000275", "hsTnI"]
          'TnT': ["UO:0000275", "TnT"]
          'TnI': ["UO:0000275", "TnI"]

  

validations:
  - type: required
    field: submitter_participant_id

post_processing:
  - type: convert_nullable_int
    columns: auto

  - type: filter_records
    field: measurement_code
    operator: regex_match_any
    value: 
      - '^LOINC:(\d|\w)+-\d$'

  - type: clean_numeric
    fields: [measurement_result_numeric]
