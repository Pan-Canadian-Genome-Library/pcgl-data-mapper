    code: "LOINC:718-7"
    term: "Hemoglobin [Mass/volume] in Blood"
    source_label: "Haemoglobin"
    enrichments:
      - target_field: measurement_result_numeric
        source_field: lab_haemoglobin_result
        target_type: float
      - target_field: [measurement_unit, measurement_unit_source_text]
        source_field: lab_haemoglobin_unit
        value_mappings:
          'g_dL': ["UO:0000208", "g/dL"]
          'g_L': ["UO:0000175", "g/L"]
  
  - source_field: lab_wbc
