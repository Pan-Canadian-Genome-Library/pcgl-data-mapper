# HostSeq Study - Phenotype Entity Mapping Configuration
#
# Target Entity: Phenotype (PCGL Base + Extension Schema)
# Source: HostSeq REDCap export (main records only, baseline)
# Pattern: Expansion - Wide-to-long conversion (checkboxes → multiple records)
#
# See YAML_CONFIGURATION_GUIDE.md for detailed documentation on expansion configuration.

entity:
  name: Phenotype
  source_files:
    primary: "HostSeqHarmonizedAllVariablesDummy.csv"  # Main source file

  fields:
    base:
      - submitter_participant_id
      - age_at_phenotype
      - phenotype_code
      - phenotype_term
      - phenotype_observed
      - phenotype_duration
      - phenotype_severity
    extension:
      - phenotype_source_text
      - phenotype_note
  pattern: expansion
  params:
    participant_id_field: id_hostseq
    selection_type: radio
    skip_values: []  # create records for all

# =============================================================================
# PREPROCESSING FILTERS
# =============================================================================
filters:
  participant_id_field: "id_hostseq"
  
  participant:
    filter:
      # Must have consent
      - field: consent
        op: equals
        value: 1
      # AND one of these conditions:
      # - Not suspected (covid19_suspected___0 = 0), OR
      # - COVID test positive (covid19_test = 1) even if suspected
      - any:
          - field: covid19_suspected___0
            op: equals
            value: 0
          - field: covid19_test
            op: equals
            value: 1
            
  rows:
    - name: baseline
      filter:
        - field: redcap_repeat_instrument
          op: is_null

  enrich:

# Optional preprocessing steps before mapping
preprocessing:
  - type: construct_date
    target: birth_date
    params:
      year_field: dob_year
      month_field: dob_month

mappings:
  # ---------------------------------------------------------------------------
  # Phenotype Record Expansion
  # Converts symptom checkboxes into N records per participant
  # ---------------------------------------------------------------------------
  - source_field: id_hostseq
    target_field: submitter_participant_id
    source_label: "HostSeq study ID"

  - target_field: age_at_phenotype
    target_type: age
    source_label: null
    params:
      birth_date_field: birth_date
      event_date_field: first_symptom_date
      age_fallback_field: null
      
  - target_field: phenotype_observed
    source_type: radio
    value_mappings:
      0: "No"
      1: "Yes"
      -1: "Unknown"

# Each radio maps to specific HPO code and term
configs:
  # =====================================================================
  # Primary Symptoms (from clinical presentation)
  # =====================================================================

  - source_field: first_symptom_none___0
    code: "HP:0000118"
    term: "Phenotypic abnormality"
    source_label: "First symptom - none (asymptomatic)"

  - source_field: cough
    code: "HP:0012735"
    term: "Cough"
    source_label: "Cough"
    enrichments:
      - target_field: [phenotype_observed, phenotype_note]
        source_type: radio
        value_mappings:
          0: ["No", null]
          1: ["Yes", null]
          2: ["Yes", "cough with sputum production"]
          3: ["Yes", "cough with bloody sputum/haemoptysis"]
      - target_field: phenotype_duration
        source_field: days_cough
        target_type: integer
  
  - source_field: difficulty_breathing
    code: "HP:0002094"
    term: "Dyspnea"
    source_label: "Difficulty breathing"
    enrichments:
      - target_field: phenotype_severity
        source_field: diff_breathing_specify
        value_mappings:
          1: "Mild"
          2: "Moderate"
          3: "Severe"

  - source_field: fever
    code: "HP:0001945"
    term: "Fever"
    source_label: "Fever"
    enrichments:
      - target_field: phenotype_duration
        source_field: days_fever
        target_type: integer
      - target_field: phenotype_note
        target_type: note
        source_field: [highest_temp, highest_temp_unit]
  
  - source_field: fatigue
    code: "HP:0012378"
    term: "Fatigue"
    source_label: "Fatigue"
  
  - source_field: myalgia
    code: "HP:0003326"
    term: "Myalgia"
    source_label: "Myalgia (general aches and pains)"
  
  - source_field: runny_nose
    code: "HP:0031417"
    term: "Rhinorrhea"
    source_label: "Runny nose"
  
  - source_field: sore_throat
    code: "HP:0033050"
    term: "Pharyngalgia"
    source_label: "Sore throat"
  
  - source_field: loss_taste_smell
    code: "HP:0000458"
    term: "Anosmia"
    source_label: "Loss of taste/smell sense"
    enrichments:
      - target_field: [phenotype_observed, phenotype_note]
        source_field: loss_taste_smell_specify
        value_mappings:
          1: ["Yes", "Loss of Only smell"]
          2: ["No", null]
          3: ["Yes", "Loss of Both taste and smell"]
