  # =====================================================================
  # Asymptomatic and Symptom Specifications
  # =====================================================================
  - source_field: asymptomatic
    code: "HP:0000118"
    term: "Phenotypic abnormality"
    source_label: "Asymptomatic"
  
  - source_field: symp_other
    code: "HP:0000118"
    term: "Phenotypic abnormality"
    source_label: "Other symptoms"
    enrichments:
      - target_field: phenotype_observed
        default_value: "Yes"
      - target_field: phenotype_note
        target_type: note
        source_field: [symp_other]
          
  
  # =====================================================================
