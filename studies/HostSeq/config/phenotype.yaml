    source_label: "Other complications"
    enrichments:
      - target_field: phenotype_note
        target_type: note
        source_field: comp_other_desc



# =============================================================================
# VALIDATION RULES
# =============================================================================
validations:
  # Participant ID is required
  - type: required
    field: submitter_participant_id

# =============================================================================
# POST-PROCESSING STEPS
# =============================================================================
post_processing:
  # Convert age and duration fields to nullable integer
  - type: convert_nullable_int
    columns: auto
  - type: filter_records
    field: phenotype_code
    operator: regex_match_any
    value:
      - '^HP:[0-9]{7}$' 

