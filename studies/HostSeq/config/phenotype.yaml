        source_field: loss_taste_smell_specify
        value_mappings:
          1: ["No", null]
          2: ["Yes", "Loss of Only taste"]
          3: ["Yes", "Loss of Both taste and smell"]
          -1: ["Unknown", "Don't know loss of taste or smell"]

  - source_field: nosebleed
    code: "HP:0000421"
