# Treatment Entity Configuration Template
#
# PCGL Base Schema: Treatment
# All base fields are pre-defined below - customize source_field and source_label for your study

entity:
  name: Treatment
  
  # Optional: Multi-file input support 
  # Uncomment and customize to load from specific CSV file(s)
  # source_files:
  #   primary: "treatments.csv"  # or "clinical.csv"
  #   # Optional: Join additional files if needed
  #   # secondary:
  #   #   - file: "demographics.csv"
  #   #     join_on: participant_id
  #   #     columns: [age, dob_year]
  
  fields:
    base:
      - submitter_participant_id
      - submitter_treatment_id
      - treatment_type
      - submitter_diagnosis_id
      - age_at_treatment
      - treatment_duration
      - treatment_intent
      - treatment_response
      - treatment_status
    # optionally include extension fields
    #extension:
      # Template: Add any extension fields needed for your study
      # - treatment_note
      # ADD MORE EXTENSION FIELDS HERE 
      
  pattern: expansion
  
  # Optional: Use custom pattern for advanced transformations
  # pattern: custom
  # function: your_custom_expansion_function
  
  # Parameters for expansion pattern 
  params:
    participant_id_field: participant_id  # CUSTOMIZE: Your participant ID field
    skip_values: [0, null]  # Skip unchecked checkboxes and null values

